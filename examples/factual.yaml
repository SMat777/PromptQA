# PromptQA — Factual Accuracy Suite
#
# Tests whether an LLM provides correct factual information
# on verifiable questions.

name: "Factual Accuracy"
description: "Verify LLM provides correct answers to known factual questions"
provider: mock

tests:
  - name: "Geography — Danish capital"
    prompt: "What is the capital of Denmark?"
    system: "Answer in one sentence. Be factual and concise."
    criteria:
      - type: contains
        value: "Copenhagen"
        description: "Must state Copenhagen as the capital"
      - type: max_length
        value: 100
        description: "Should be concise"

  - name: "Science — water formula"
    prompt: "What is the chemical formula for water?"
    system: "Answer with just the formula and its name."
    criteria:
      - type: contains
        value: "H2O"
        description: "Must include H2O"

  - name: "History — moon landing year"
    prompt: "In what year did humans first land on the moon?"
    system: "Answer in one sentence."
    criteria:
      - type: contains
        value: "1969"
        description: "Must state 1969"
      - type: not_contains
        value: "1968"
        description: "Should not state incorrect year"

  - name: "Math — basic arithmetic"
    prompt: "What is 144 divided by 12?"
    system: "Answer with just the number."
    criteria:
      - type: equals
        value: "12"
        description: "Must be exactly 12"
      - type: max_length
        value: 50
        description: "Should be very concise"

  - name: "Structured output — JSON response"
    prompt: "List the three largest oceans as JSON."
    system: "Respond with only valid JSON. Use format: {\"oceans\": [...]}"
    criteria:
      - type: json_valid
        value: true
        description: "Must be valid JSON"
      - type: regex
        value: "Pacific|Atlantic|Indian"
        description: "Must mention at least one major ocean"
      - type: min_length
        value: 20
        description: "Response should be substantive"

  - name: "Case-insensitive geography"
    prompt: "Name a Scandinavian country."
    system: "Answer in one word."
    criteria:
      - type: contains
        value: "denmark"
        case_insensitive: true
        description: "Must mention Denmark (any casing)"

mock_responses:
  "What is the capital of Denmark?": "The capital of Denmark is Copenhagen."
  "What is the chemical formula for water?": "The chemical formula for water is H2O (dihydrogen monoxide)."
  "In what year did humans first land on the moon?": "Humans first landed on the moon in 1969, during the Apollo 11 mission."
  "What is 144 divided by 12?": "12"
  "List the three largest oceans as JSON.": "{\"oceans\": [\"Pacific\", \"Atlantic\", \"Indian\"]}"
  "Name a Scandinavian country.": "Denmark"
